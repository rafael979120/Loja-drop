<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ produto.nome }} - Loja Drop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header><a href="/">LOJA DROP</a></header>
    <main>
        <div class="produto-detalhe">
            <div class="produto-img">
                <img src="{{ url_for('static', filename='img/produtos/' ~ produto.imagem) }}" alt="{{ produto.nome }}" onerror="this.src='https://via.placeholder.com/400'">
            </div>
            <div class="produto-info">
                <h1>{{ produto.nome }}</h1>
                <p class="preco">R$ {{ "%.2f"|format(produto.preco)|replace('.', ',') }}</p>
                <a href="{{ url_for('main.checkout', produto_id=produto.id) }}" class="btn-comprar btn-block" style="text-align:center;">Comprar Agora</a>
                <p style="margin-top:20px; color:#86868b; font-size:0.9rem;">✓ Compra Segura via Mercado Pago<br>✓ Envio Imediato</p>
            </div>
        </div>
    </main>
</body>
</html>
